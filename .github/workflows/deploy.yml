name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync immutable assets to S3 (long cache)
        run: |
          aws s3 sync ./out/_next/static s3://${{ secrets.S3_BUCKET }}/_next/static \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML + assets to S3 (short cache, preserve access logs)
        run: |
          aws s3 sync ./out s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "*.gz" \
            --exclude "_next/static/*" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          echo "CloudFront invalidation: $INVALIDATION_ID"
